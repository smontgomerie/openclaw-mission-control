services:
  backend:
    environment:
      NVIDIA_VISIBLE_DEVICES: ${OPENCLAW_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${OPENCLAW_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OPENCLAW_GPU_COUNT:-all}
              capabilities: [gpu]

  webhook-worker:
    environment:
      NVIDIA_VISIBLE_DEVICES: ${OPENCLAW_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${OPENCLAW_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OPENCLAW_GPU_COUNT:-all}
              capabilities: [gpu]
